# ══════════════════════════════════════════════════════════
#  hyprlock — Tesla UI
#  Dark · Centered · Typography-first · Zero decoration
# ══════════════════════════════════════════════════════════

general {
    disable_loading_bar   = true
    hide_cursor           = true
    grace                 = 0
    no_fade_in            = false
    no_fade_out           = false
}

# ── Fondo: wallpaper con blur oscuro ──────────────────────
background {
    monitor     =
    path        = screenshot                  # toma screenshot al bloquear
    blur_passes = 3
    blur_size   = 7
    brightness  = 0.45                        # oscurece para que el texto resalte
    contrast    = 0.9
    vibrancy    = 0.15
}

# ══════════════════════════════════════════════════════════
#  HORA — elemento dominante, como en el dashboard Tesla
#  Peso fino, tamaño enorme, centrado verticalmente arriba
# ══════════════════════════════════════════════════════════
label {
    monitor   =
    text      = cmd[update:1000] echo "<span font_weight='200'>$(date +"%H:%M")</span>"
    font_size = 112
    font_family = JetBrainsMono Nerd Font

    color     = rgba(255, 255, 255, 0.92)

    position  = 0, 80
    halign    = center
    valign    = center
}

# ── Fecha — discreta, justo debajo de la hora ─────────────
label {
    monitor   =
    text      = cmd[update:60000] echo "<span font_weight='300'>$(date +"%A, %d de %B")</span>"
    font_size = 18
    font_family = JetBrainsMono Nerd Font

    color     = rgba(255, 255, 255, 0.42)

    position  = 0, -30
    halign    = center
    valign    = center
}

# ══════════════════════════════════════════════════════════
#  CAMPO DE CONTRASEÑA — línea fina, sin caja pesada
#  Tesla style: input minimalista, casi invisible hasta
#  que interactuás con él
# ══════════════════════════════════════════════════════════
input-field {
    monitor   =
    size      = 280, 38
    outline_thickness = 1

    # Fondo casi transparente — solo visible el borde
    inner_color       = rgba(255, 255, 255, 0.04)
    outer_color       = rgba(255, 255, 255, 0.18)

    # Estado: escribiendo
    check_color       = rgba(255, 255, 255, 0.60)

    # Estado: contraseña incorrecta
	fail_text  = <span foreground="##ff453a" size="small">Varios fallos pueden bloquear el sistema por 5 minutos</span>
	fail_color = rgba(255, 69, 58, 0.70)
    # Placeholder
    placeholder_text  = <span foreground="##ffffff55" size="small">· · ·</span>

    # Dots en lugar de asteriscos
    font_color = rgba(255, 255, 255, 0.90)
    dots_size         = 0.22
    dots_spacing      = 0.25
    dots_center       = true
    dots_rounding     = -1

    fade_on_empty     = true
    capslock_color    = rgba(255, 214, 10, 0.70)

    rounding          = 6
    shadow_passes     = 0

    position          = 0, -145
    halign            = center
    valign            = center
}

# ── Hint sutil debajo del input ───────────────────────────
label {
    monitor   =
    text      = <span size="small">Ingresá tu contraseña</span>
    font_size = 11
    font_family = JetBrainsMono Nerd Font
    color     = rgba(255, 255, 255, 0.22)
    position  = 0, -195
    halign    = center
    valign    = center
}
